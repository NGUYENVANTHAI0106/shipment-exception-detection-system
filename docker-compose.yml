services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shipment}
      POSTGRES_USER: ${POSTGRES_USER:-shipment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shipment}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DB_URL: ${APP_DB_URL:-postgresql+psycopg://${POSTGRES_USER:-shipment}:${POSTGRES_PASSWORD:-shipment}@postgres:5432/${POSTGRES_DB:-shipment}}
      APP_REDIS_URL: ${APP_REDIS_URL:-redis://redis:6379/0}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-secret-change-me}
      APP_JWT_ALG: ${APP_JWT_ALG:-HS256}
      APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${APP_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      APP_SEED_ON_STARTUP: ${APP_SEED_ON_STARTUP:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read(); print('ok')\""]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    env_file:
      - ./.env
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PATH=/n8n/
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:8080/n8n/}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:8080/n8n/}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-admin}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_HOST_PORT:-5679}:5678"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    env_file:
      - ./.env
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-/api}
      - API_INTERNAL_BASE=${API_INTERNAL_BASE:-http://api:8000/api}
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
      n8n:
        condition: service_started
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  n8n_data:
