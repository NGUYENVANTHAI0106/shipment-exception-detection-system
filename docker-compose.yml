services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shipment}
      POSTGRES_USER: ${POSTGRES_USER:-shipment}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shipment}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  mock-data:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: services/Dockerfile
    command: ["uvicorn", "services.mock-data.main:app", "--host", "0.0.0.0", "--port", "8004"]
    restart: unless-stopped

  detector:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: services/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      DETECTOR_DEDUP_TTL_SECONDS: ${DETECTOR_DEDUP_TTL_SECONDS:-3600}
    command: ["uvicorn", "services.detector.main:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  classifier:
    build:
      context: .
      dockerfile: services/Dockerfile
    env_file:
      - ./.env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-12}
    command: ["uvicorn", "services.classifier.main:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: services/Dockerfile
    env_file:
      - ./.env
    command: ["uvicorn", "services.notifier.main:app", "--host", "0.0.0.0", "--port", "8003"]
    ports:
      - "8003:8003"
    restart: unless-stopped

  api:
    profiles: ["fullstack"]
    build:
      context: .
      dockerfile: services/Dockerfile
    env_file:
      - ./.env
    environment:
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-secret-change-me}
      APP_ACCESS_TOKEN_EXPIRE_MINUTES: ${APP_ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      WEBAPI_DB_DSN: ${WEBAPI_DB_DSN:-postgresql://shipment:shipment@postgres:5432/shipment}
    command: ["uvicorn", "services.webapi.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read(); print('ok')\""]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    env_file:
      - ./.env
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PATH=${N8N_PATH:-/n8n/}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:8080/n8n/}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:8080/n8n/}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-1}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-Asia/Ho_Chi_Minh}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-admin}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "${N8N_HOST_PORT:-5679}:5678"
    restart: unless-stopped

  frontend:
    profiles: ["fullstack"]
    build:
      context: ./frontend
    env_file:
      - ./.env
    environment:
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-/api}
      - API_INTERNAL_BASE=${API_INTERNAL_BASE:-http://api:8000/api}
      - VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-http://api:8000}
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      n8n:
        condition: service_started
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  n8n_data:
